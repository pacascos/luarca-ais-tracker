# Ejemplo de configuración nginx para exponer el servidor estático local.
# Ajusta server_name, certificados y rutas. Copiar a /etc/nginx/sites-available/
# y enlazar a sites-enabled/.

server {
    listen 80;
    server_name ais.tu-dominio.com;

    # Redirige a HTTPS (recomendado, usar certbot --nginx para obtener cert)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ais.tu-dominio.com;

    ssl_certificate     /etc/letsencrypt/live/ais.tu-dominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ais.tu-dominio.com/privkey.pem;

    access_log /var/log/nginx/luarca-ais.access.log;
    error_log  /var/log/nginx/luarca-ais.error.log;

    # Mapas regenerados cada 5 min — caché breve
    location / {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache cliente: 60s para los HTML, 1h para tiles (los tiles van a CDNs externos igualmente)
        add_header Cache-Control "public, max-age=60";
    }
}
